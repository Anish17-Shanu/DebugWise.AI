apiVersion: apps/v1
kind: Deployment
metadata:
  name: debugwise-web
  namespace: debugwise
spec:
  replicas: 1
  selector:
    matchLabels:
      app: debugwise-web
  template:
    metadata:
      labels:
        app: debugwise-web
    spec:
      containers:
        - name: web
          image: debugwise-web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: debugwise-web
  namespace: debugwise
spec:
  selector:
    app: debugwise-web
  ports:
    - port: 8080
      targetPort: 8080

