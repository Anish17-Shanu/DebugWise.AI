apiVersion: apps/v1
kind: Deployment
metadata:
  name: debugwise-gateway
  namespace: debugwise
spec:
  replicas: 1
  selector:
    matchLabels:
      app: debugwise-gateway
  template:
    metadata:
      labels:
        app: debugwise-gateway
    spec:
      containers:
        - name: gateway
          image: debugwise-gateway:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: debugwise-config
          ports:
            - containerPort: 4000
          readinessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: debugwise-gateway
  namespace: debugwise
spec:
  selector:
    app: debugwise-gateway
  ports:
    - port: 4000
      targetPort: 4000

