name: debugwise-prod

services:
  analysis:
    image: ${DEBUGWISE_ANALYSIS_IMAGE:-debugwise-analysis:latest}
    build:
      context: ../..
      dockerfile: services/analysis/Dockerfile
    env_file:
      - .env.prod
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - debugwise
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 20s
      timeout: 5s
      retries: 5

  gateway:
    image: ${DEBUGWISE_GATEWAY_IMAGE:-debugwise-gateway:latest}
    build:
      context: ../..
      dockerfile: services/gateway/Dockerfile
    env_file:
      - .env.prod
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      analysis:
        condition: service_healthy
    networks:
      - debugwise
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 5

  web:
    image: ${DEBUGWISE_WEB_IMAGE:-debugwise-web:latest}
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
      args:
        VITE_DEBUGWISE_GATEWAY_URL: /api
        VITE_DEBUGWISE_WS_URL: /ws
    restart: unless-stopped
    depends_on:
      gateway:
        condition: service_healthy
    networks:
      - debugwise

  proxy:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - web
      - gateway
    ports:
      - "${DEBUGWISE_HTTP_PORT:-80}:80"
    volumes:
      - ../nginx/proxy.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - debugwise

networks:
  debugwise:
    driver: bridge
