name: Docker Images

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/debugwise-web:${{ github.ref_name }}

      - name: Build and push gateway
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/gateway/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/debugwise-gateway:${{ github.ref_name }}

      - name: Build and push analysis
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/analysis/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/debugwise-analysis:${{ github.ref_name }}

