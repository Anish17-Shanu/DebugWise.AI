services:
  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    env_file:
      - .env
    environment:
      DEBUGWISE_ANALYSIS_URL: http://analysis:8000
      DEBUGWISE_OLLAMA_URL: http://host.docker.internal:11434
    ports:
      - "4000:4000"
    depends_on:
      - analysis
    volumes:
      - ./sandbox:/app/sandbox

  analysis:
    build:
      context: .
      dockerfile: services/analysis/Dockerfile
    env_file:
      - .env
    environment:
      DEBUGWISE_OLLAMA_URL: http://host.docker.internal:11434
      DEBUGWISE_DEFAULT_CODE_MODEL: deepseek-coder
      DEBUGWISE_DEFAULT_REASONING_MODEL: deepseek-r1
    ports:
      - "8000:8000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_DEBUGWISE_GATEWAY_URL: http://localhost:4000/api
        VITE_DEBUGWISE_WS_URL: ws://localhost:4000/ws
    ports:
      - "4173:8080"
    depends_on:
      - gateway
